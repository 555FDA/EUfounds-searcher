name: EU Funding Monitor

on:
  schedule:
    # Runs every Monday at 07:00 UTC (09:00 Bucharest time)
    - cron: '0 7 * * 1'
  workflow_dispatch:    # Allow manual trigger from GitHub UI
    inputs:
      dry_run:
        description: 'Dry run (no email)'
        required: false
        default: 'false'
        type: boolean

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run funding monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GH_PAT: ${{ secrets.GH_PAT }}
          LOOKBACK_DAYS: 7
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node index.js --dry-run
          else
            node index.js
          fi

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: funding-monitor-report-${{ github.run_number }}
          path: output/
          retention-days: 90
      - name: Email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "⚠️ EU Funding Monitor FAILED — run #${{ github.run_number }}"
          to: ${{ secrets.EMAIL_TO }}
          from: EU Funding Monitor <${{ secrets.EMAIL_FROM }}>
          body: |
            The weekly EU funding monitor failed on run #${{ github.run_number }}.

            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This did not deliver this week's digest. Check the Action logs.
